[phases.setup]
nixPkgs = ["nodejs_22", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
PATH = "/app/.venv/bin:${PATH}"
